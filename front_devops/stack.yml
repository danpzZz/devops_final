version: "3.9"

services:

  frontend:
    image: ghcr.io/danpzzz/devops_final-front:1.0.0
    environment:
      BACKEND_URL: http://backend_backend:5000
    networks:
      - traefik-public
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"

        - "traefik.http.routers.frontend-http.rule=Host(`perez.byronrm.com`)"
        - "traefik.http.routers.frontend-http.entrypoints=web"
        - "traefik.http.routers.frontend-http.middlewares=frontend-https-redirect"
        - "traefik.http.routers.frontend-http.service=frontend-svc"

        - "traefik.http.middlewares.frontend-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.frontend-https-redirect.redirectscheme.permanent=true"

        - "traefik.http.routers.frontend-secure.rule=Host(`perez.byronrm.com`)"
        - "traefik.http.routers.frontend-secure.entrypoints=websecure"
        - "traefik.http.routers.frontend-secure.tls=true"
        - "traefik.http.routers.frontend-secure.tls.certresolver=letsencrypt"
        - "traefik.http.routers.frontend-secure.service=frontend-svc"

        - "traefik.http.services.frontend-svc.loadbalancer.server.port=3000"
        - "traefik.swarm.network=traefik-public"

networks:

  traefik-public:
    external: true

  app-network:
    external: true